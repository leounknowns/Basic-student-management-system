<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="welcome">Welcome Student's</h1>
    <div class="searchCtnr">
        <input id="searchBox" type="text" placeholder="Search by Roll Number">
        <button id="searchBtn" onclick="getValue()">Search</button>
    </div>
    <div id="result">
        <div class="resultdtl">
            <h2 id="studentRollNumber">Roll number:</h2>
            <span id="resultRn">resultRn</span>
        </div>
        <div class="resultdtl">
            <h2 id="studentName">Name:</h2>
            <span id="resultN">resultN</span>
        </div>
        <div class="resultdtl">
            <h2 id="studentSubject">Subject:</h2>
            <span id="resultSbj">resultSbj</span>
        </div>
        <div class="resultdtl">
            <h2 id="studentMarks">Marks:</h2>
            <span id="resultM">resultM</span>
        </div>
        <div class="resultdtl">
            <h2 id="studentGrade">Grade:</h2>
            <span id="resultG">resultG</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
